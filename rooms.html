<!-- Main Content -->
<div class="content">

<h1>Room Management</h1>

<button onclick="openRoomModal()">+ Add Room</button>

<br><br>

<table id="roomTable">

<tr>
<th>ID</th>
<th>Building</th>
<th>Room No.</th>
<th>Floor</th>
<th>Room Type</th>
<th>Monthly Rent</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>

<td>1</td>
<td>Main Building</td>
<td>101</td>
<td>1</td>
<td>Office</td>
<td>₱15,000</td>
<td>Vacant</td>

<td>

<button onclick="editRoom(this)">Edit</button>

<button onclick="deleteRoom(this)">Delete</button>

</td>

</tr>

</table>

</div>

<!-- Modal -->

<div id="roomModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeRoomModal()">&times;</span>

<h2>Add Room</h2>

<label>Building</label>

<select id="roomBuilding">

<option>Main Building</option>

<option>Building B</option>

<option>Building C</option>

</select>

<label>Room Number</label>

<input type="text" id="roomNumber">

<label>Floor</label>

<input type="number" id="roomFloor">

<label>Room Type</label>

<select id="roomType">

<option>Office</option>

<option>Commercial</option>

<option>Storage</option>

</select>

<label>Monthly Rent</label>

<input type="number" id="roomRent">

<label>Status</label>

<select id="roomStatus">

<option>Vacant</option>

<option>Occupied</option>

<option>Maintenance</option>

</select>

<button onclick="addRoom()">Save</button>

</div>

</div>

<script src="js/script.js"></script>

</body>
