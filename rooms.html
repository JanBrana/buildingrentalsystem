<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms — JEFARELID</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="rooms">

<div class="sidebar">
    <h2>JEFARELID</h2>
    <a href="dashboard.html" data-page="dashboard">🏠 Dashboard</a>
    <a href="buildings.html" data-page="buildings">🏢 Buildings</a>
    <a href="rooms.html" data-page="rooms">🚪 Rooms</a>
    <a href="tenants.html" data-page="tenants">👤 Tenants</a>
    <a href="contracts.html" data-page="contracts">📝 Contracts</a>
    <a href="payments.html" data-page="payments">💰 Payments</a>
    <a href="utility.html" data-page="utility">💡 Utility Billing</a>
    <a href="reports.html" data-page="reports">📊 Reports</a>
    <div id="superAdminMenu">
        <a href="users.html" data-page="users">👥 User Management</a>
        <a href="auditlogs.html" data-page="auditlogs">📋 Audit Logs</a>
    </div>
    <a href="#" class="logout-link" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">
    <div class="page-header">
        <div>
            <h1>Room Management</h1>
            <p>Manage rooms across all buildings</p>
        </div>
        <button onclick="openRoomModal()">+ Add Room</button>
    </div>

    <div class="table-toolbar">
        <input type="text" id="roomSearch" class="search-box" placeholder="Search rooms..." oninput="filterRooms()">
    </div>

    <div class="panel">
        <div class="panel-body table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Building</th><th>Room No.</th><th>Floor</th>
                        <th>Room Type</th><th>Monthly Rent</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="roomTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="roomModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeRoomModal()">&times;</span>
        <h2>Add Room</h2>
        <input type="hidden" id="roomEditId">
        <label>Building</label>
        <select id="roomBuilding"></select>
        <div class="form-row">
            <div>
                <label>Room Number</label>
                <input type="text" id="roomNumber" placeholder="e.g. 101">
            </div>
            <div>
                <label>Floor</label>
                <input type="number" id="roomFloor" min="1">
            </div>
        </div>
        <label>Room Type</label>
        <select id="roomType">
            <option>Office</option>
            <option>Commercial</option>
            <option>Storage</option>
            <option>Retail</option>
        </select>
        <label>Monthly Rent (₱)</label>
        <input type="number" id="roomRent" min="0" step="100">
        <label>Status</label>
        <select id="roomStatus">
            <option>Vacant</option>
            <option>Occupied</option>
            <option>Maintenance</option>
        </select>
        <button class="btn-save" onclick="addRoom()">Save Room</button>
    </div>
</div>

<script src="js/app.js"></script>
<script>window.pageInit = loadRooms;</script>
</body>
</html>
