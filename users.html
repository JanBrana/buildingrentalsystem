<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management — JEFARELID</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="users">

<div class="sidebar">
    <h2>JEFARELID</h2>
    <a href="dashboard.html" data-page="dashboard">🏠 Dashboard</a>
    <a href="buildings.html" data-page="buildings">🏢 Buildings</a>
    <a href="rooms.html" data-page="rooms">🚪 Rooms</a>
    <a href="tenants.html" data-page="tenants">👤 Tenants</a>
    <a href="contracts.html" data-page="contracts">📝 Contracts</a>
    <a href="payments.html" data-page="payments">💰 Payments</a>
    <a href="utility.html" data-page="utility">💡 Utility Billing</a>
    <a href="reports.html" data-page="reports">📊 Reports</a>
    <div id="superAdminMenu">
        <a href="users.html" data-page="users">👥 User Management</a>
        <a href="auditlogs.html" data-page="auditlogs">📋 Audit Logs</a>
    </div>
    <a href="#" class="logout-link" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">
    <div class="page-header">
        <div>
            <h1>User Management</h1>
            <p>Manage system users and access roles (Super Admin only)</p>
        </div>
        <button onclick="openUserModal()">+ Add User</button>
    </div>

    <div class="panel">
        <div class="panel-body table-wrap">
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeUserModal()">&times;</span>
        <h2>Add User</h2>
        <input type="hidden" id="userEditId">
        <label>Full Name</label>
        <input type="text" id="userName" placeholder="Full name">
        <label>Email</label>
        <input type="email" id="userEmail" placeholder="email@jefarelid.com">
        <label>Password</label>
        <input type="password" id="userPassword" placeholder="Leave blank to keep current (edit mode)">
        <label>Role</label>
        <select id="userRole">
            <option value="admin">Admin</option>
            <option value="superadmin">Super Admin</option>
        </select>
        <button class="btn-save" onclick="addUser()">Save User</button>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    window.pageInit = function() {
        if (localStorage.getItem("role") !== "superadmin") {
            window.location.href = "dashboard.html";
            return;
        }
        loadUsers();
    };
</script>
</body>
</html>
