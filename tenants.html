<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenants — JEFARELID</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="tenants">

<div class="sidebar">
    <h2>JEFARELID</h2>
    <a href="dashboard.html" data-page="dashboard">🏠 Dashboard</a>
    <a href="buildings.html" data-page="buildings">🏢 Buildings</a>
    <a href="rooms.html" data-page="rooms">🚪 Rooms</a>
    <a href="tenants.html" data-page="tenants">👤 Tenants</a>
    <a href="contracts.html" data-page="contracts">📝 Contracts</a>
    <a href="payments.html" data-page="payments">💰 Payments</a>
    <a href="utility.html" data-page="utility">💡 Utility Billing</a>
    <a href="reports.html" data-page="reports">📊 Reports</a>
    <div id="superAdminMenu">
        <a href="users.html" data-page="users">👥 User Management</a>
        <a href="auditlogs.html" data-page="auditlogs">📋 Audit Logs</a>
    </div>
    <a href="#" class="logout-link" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">
    <div class="page-header">
        <div>
            <h1>Tenant Management</h1>
            <p>Manage tenant companies and contact information</p>
        </div>
        <button onclick="openTenantModal()">+ Add Tenant</button>
    </div>

    <div class="table-toolbar">
        <input type="text" id="tenantSearch" class="search-box" placeholder="Search tenants..." oninput="filterTenants()">
    </div>

    <div class="panel">
        <div class="panel-body table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Company Name</th><th>Contact Person</th>
                        <th>Contact Number</th><th>Email</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tenantTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="tenantModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeTenantModal()">&times;</span>
        <h2>Add Tenant</h2>
        <input type="hidden" id="tenantEditId">
        <label>Company Name</label>
        <input type="text" id="company" placeholder="Company or business name">
        <label>Contact Person</label>
        <input type="text" id="contactPerson" placeholder="Full name">
        <label>Contact Number</label>
        <input type="text" id="contactNumber" placeholder="09XXXXXXXXX">
        <label>Email</label>
        <input type="email" id="tenantEmail" placeholder="email@company.com">
        <label>Status</label>
        <select id="tenantStatus">
            <option value="Active">Active</option>
            <option value="Pending Approval">Pending Approval</option>
            <option value="Reserved">Reserved</option>
            <option value="Contract Expiring">Contract Expiring</option>
            <option value="Renewed">Renewed</option>
            <option value="Expired">Expired</option>
            <option value="Terminated">Terminated</option>
            <option value="Inactive">Inactive</option>
        </select>
        <button class="btn-save" onclick="addTenant()">Save Tenant</button>
    </div>
</div>

<script src="js/app.js"></script>
<script>window.pageInit = loadTenants;</script>
</body>
</html>
