<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — JEFARELID Rental Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-container">
    <div class="logo">🏢</div>
    <h2>JEFARELID CORP.</h2>
    <h3>Building and Room Rental Management System</h3>

    <form onsubmit="login(event)">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@jefarelid.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit">Sign In</button>
    </form>

    <div class="login-hint">
        <strong>Demo Accounts:</strong><br>
        Super Admin — superadmin@jefarelid.com / admin123<br>
        Admin — admin@jefarelid.com / admin123<br>
        Staff — staff@jefarelid.com / staff123
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
