<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments — JEFARELID</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="payments">

<div class="sidebar">
    <h2>JEFARELID</h2>
    <a href="dashboard.html" data-page="dashboard">🏠 Dashboard</a>
    <a href="buildings.html" data-page="buildings">🏢 Buildings</a>
    <a href="rooms.html" data-page="rooms">🚪 Rooms</a>
    <a href="tenants.html" data-page="tenants">👤 Tenants</a>
    <a href="contracts.html" data-page="contracts">📝 Contracts</a>
    <a href="payments.html" data-page="payments">💰 Payments</a>
    <a href="utility.html" data-page="utility">💡 Utility Billing</a>
    <a href="reports.html" data-page="reports">📊 Reports</a>
    <div id="superAdminMenu">
        <a href="users.html" data-page="users">👥 User Management</a>
        <a href="auditlogs.html" data-page="auditlogs">📋 Audit Logs</a>
    </div>
    <a href="#" class="logout-link" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">
    <div class="page-header">
        <div>
            <h1>Payment Management</h1>
            <p>Record and track rent and deposit payments</p>
        </div>
        <button onclick="openPaymentModal()">+ Record Payment</button>
    </div>

    <div class="table-toolbar">
        <input type="text" id="paymentSearch" class="search-box" placeholder="Search payments..." oninput="filterPayments()">
    </div>

    <div class="panel">
        <div class="panel-body table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Tenant</th><th>Type</th><th>Amount</th><th>Date</th>
                        <th>Method</th><th>Reference</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePaymentModal()">&times;</span>
        <h2>Record Payment</h2>
        <input type="hidden" id="paymentEditId">
        <label>Contract / Tenant</label>
        <select id="paymentContract" onchange="onPaymentContractChange()"></select>
        <label>Payment Type</label>
        <select id="paymentType">
            <option>Rent</option>
            <option>Deposit</option>
            <option>Utility</option>
            <option>Penalty</option>
            <option>Other</option>
        </select>
        <div class="form-row">
            <div>
                <label>Amount (₱)</label>
                <input type="number" id="paymentAmount" min="0" step="100">
            </div>
            <div>
                <label>Payment Date</label>
                <input type="date" id="paymentDate">
            </div>
        </div>
        <label>Payment Method</label>
        <select id="paymentMethod">
            <option>Cash</option>
            <option>Bank Transfer</option>
            <option>Check</option>
            <option>GCash</option>
            <option>Online Banking</option>
        </select>
        <label>Reference Number</label>
        <input type="text" id="paymentReference" placeholder="Transaction or check number">
        <label>Status</label>
        <select id="paymentStatus">
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
        </select>
        <button class="btn-save" onclick="addPayment()">Save Payment</button>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    window.pageInit = function() {
        const dateInput = document.getElementById("paymentDate");
        if (dateInput) dateInput.value = new Date().toISOString().slice(0, 10);
        loadPayments();
    };
</script>
</body>
</html>
